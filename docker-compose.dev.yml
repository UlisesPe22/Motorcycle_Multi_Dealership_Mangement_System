services:
  postgresql:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: moto_app
      POSTGRES_USER: eskeleton22
      POSTGRES_PASSWORD: ulises22
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eskeleton22"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: