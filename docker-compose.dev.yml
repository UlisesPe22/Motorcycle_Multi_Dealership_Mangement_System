services:
  postgresql:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       moto_app
      POSTGRES_USER:     eskeleton22
      POSTGRES_PASSWORD: ulises22
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eskeleton22"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
    environment:
      POSTGRES_HOST:     postgresql
      POSTGRES_PORT:     5432
      POSTGRES_USER:     eskeleton22
      POSTGRES_PASSWORD: ulises22
      POSTGRES_DB:       moto_app
      GEMINI_API_KEY:    ${GEMINI_API_KEY}
    env_file:
      - .env
    depends_on:
      postgresql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
